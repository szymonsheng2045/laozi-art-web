<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#fafafa"/>
  
  <!-- 装饰线条 -->
  <line x1="100" y1="100" x2="1100" y2="100" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="100" y1="530" x2="1100" y2="530" stroke="#e5e5e5" stroke-width="1"/>
  
  <!-- 主标题 -->
  <text x="600" y="280" font-family="Georgia, serif" font-size="96" font-weight="400" fill="#1a1a1a" text-anchor="middle" letter-spacing="0.1em">
    LAOZI.ART
  </text>
  
  <!-- 副标题 -->
  <text x="600" y="360" font-family="Georgia, serif" font-size="36" fill="#666666" text-anchor="middle" letter-spacing="0.05em">
    道家美学时尚观察
  </text>
  
  <!-- 描述 -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="24" fill="#999999" text-anchor="middle">
    以道家哲学视角观察当代时尚 · Less noise, more essence
  </text>
  
  <!-- 底部装饰 -->
  <line x1="500" y1="500" x2="700" y2="500" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- 五行符号 -->
  <circle cx="300" cy="315" r="40" fill="none" stroke="#C0C0C0" stroke-width="2" opacity="0.3"/>
  <circle cx="450" cy="315" r="40" fill="none" stroke="#4A7C59" stroke-width="2" opacity="0.3"/>
  <circle cx="750" cy="315" r="40" fill="none" stroke="#8B4513" stroke-width="2" opacity="0.3"/>
  <circle cx="900" cy="315" r="40" fill="none" stroke="#8B6914" stroke-width="2" opacity="0.3"/>
</svg>
